<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GameZone Store</title>


<script src="https://cdn.tailwindcss.com"></script>


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


<link rel="stylesheet" href="style.css">


</head>


<body>


<header>

<div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">


<h1 class="text-3xl font-bold text-purple-500">

GameZone

<span class="text-white">
Store
</span>

</h1>



<button onclick="mostrarCarrinho()"
class="text-white text-xl flex gap-2">


<i class="fa-solid fa-cart-shopping"></i>


<span id="contador-carrinho"
class="bg-purple-600 rounded-full px-2 text-sm">

0

</span>


</button>



</div>

</header>




<main class="max-w-6xl mx-auto px-6 py-8">


<input

id="busca"

type="text"

placeholder="Buscar jogos..."

class="w-full p-4 rounded-xl mb-8"


onkeyup="filtrarProdutos()"



>



<div id="product-grid"

class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">


</div>



</main>






<div id="modal-carrinho"

class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">


<div class="bg-gray-900 text-white rounded-3xl p-6 max-w-md w-full">


<div class="flex justify-between">


<h2 class="text-2xl font-bold">

Carrinho

</h2>


<button onclick="fecharCarrinho()"
class="text-2xl">

X

</button>


</div>



<div id="carrinho-itens"
class="mt-5 space-y-4">


</div>




<div class="border-t mt-5 pt-5">


<h3 class="text-xl font-bold">

Total:

<span id="carrinho-total">

R$ 0,00

</span>


</h3>



<button onclick="finalizarCompra()"

class="bg-purple-600 hover:bg-purple-700 w-full p-3 rounded-xl mt-4">


Finalizar compra


</button>



</div>


</div>


</div>






<script src="script.js"></script>


</body>

</html>
